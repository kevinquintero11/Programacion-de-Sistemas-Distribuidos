ip_servidor_central=127.0.0.1
ip_servidor_horoscopo=127.0.0.1
ip_servidor_clima=127.0.0.1

# === PUERTOS ===
puerto_servidor_central=5000
puerto_servidor_horoscopo=5001
puerto_servidor_clima=5002

# === CACHE ===
tamano_cache=100

# === BUFFER ===
tamano_buffer=1024

